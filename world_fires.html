<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Wildfires — NASA EONET</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d0d1a; }
    #map { width: 100vw; height: 100vh; }

    #panel {
      position: absolute; top: 14px; left: 14px; z-index: 1000;
      background: rgba(10, 10, 25, 0.90);
      border: 1px solid rgba(255, 150, 90, 0.28);
      border-radius: 10px; padding: 14px 18px; width: 240px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #panel h2 {
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
      color: #f5945b; margin-bottom: 2px; text-transform: uppercase;
    }
    #panel .subtitle { font-size: 11px; color: #778; margin-bottom: 14px; }
    .ctrl-label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #aab; margin-bottom: 5px;
    }
    .ctrl-label .val { color: #f5945b; font-weight: 700; font-size: 13px; }
    input[type="range"] {
      width: 100%; accent-color: #f5945b; cursor: pointer;
      height: 4px; border-radius: 2px;
    }
    #stats {
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px; color: #889;
    }
    #stats b { color: #f5945b; }
    #stats .timestamp { font-size: 10px; color: #556; margin-top: 4px; }

    #loading {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10,10,25,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; flex-direction: column; gap: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(245,148,91,0.2);
      border-top-color: #f5945b;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #f5945b; font-size: 13px; letter-spacing: 0.5px; }
    #error-msg { color: #e74c3c; font-size: 12px; max-width: 280px; text-align: center; }

    .legend {
      position: absolute; bottom: 28px; right: 14px; z-index: 1000;
      background: rgba(10, 10, 25, 0.90);
      border: 1px solid rgba(255, 150, 90, 0.28);
      border-radius: 10px; padding: 12px 16px; min-width: 160px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .legend h4 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #f5945b; margin-bottom: 8px;
    }
    .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .leg-dot {
      width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .leg-txt { font-size: 11px; color: #aab; }
    .leg-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 9px 0; }
    .leg-size-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .leg-circle {
      border-radius: 50%; background: rgba(245,148,91,0.4);
      border: 1px solid rgba(245,148,91,0.7); flex-shrink: 0;
    }

    /* Leaflet tooltip override */
    .leaflet-tooltip {
      background: rgba(255,255,255,0.97) !important;
      border: none !important;
      border-radius: 8px !important;
      box-shadow: 0 3px 14px rgba(0,0,0,0.3) !important;
      padding: 0 !important;
    }
    .leaflet-tooltip-bottom::before { border-bottom-color: rgba(255,255,255,0.97) !important; }
    .tt { padding: 9px 12px; min-width: 190px; max-width: 260px; }
    .tt-place { font-size: 12px; font-weight: 700; color: #222; margin-bottom: 6px; line-height: 1.3; }
    .tt-grid { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; }
    .tt-key { font-size: 11px; color: #888; }
    .tt-val { font-size: 11px; font-weight: 600; color: #333; }
    .tt-val.hot { color: #c0392b; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Fetching NASA wildfire data…</p>
  <div id="error-msg"></div>
</div>

<div id="panel">
  <h2>World Wildfires</h2>
  <div class="subtitle">NASA EONET · open wildfire events</div>
  <div class="ctrl-label">
    Min size &nbsp;<span class="val" id="acreVal">0 ac</span>
  </div>
  <input type="range" id="acreSlider" min="0" max="100000" step="1000" value="0">
  <div class="ctrl-label" style="margin-top:10px">
    Last &nbsp;<span class="val" id="daysVal">90 days</span>
  </div>
  <input type="range" id="daysSlider" min="1" max="365" step="1" value="90">
  <div id="stats">
    Showing <b id="vis">—</b> of <b id="tot">—</b> events
    <div class="timestamp" id="ts"></div>
  </div>
</div>

<div class="legend">
  <h4>Last detected</h4>
  <div class="leg-row"><div class="leg-dot" style="background:#e74c3c"></div><span class="leg-txt">≤ 7 days</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#f39c12"></div><span class="leg-txt">≤ 30 days</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#f1c40f"></div><span class="leg-txt">≤ 90 days</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#a9784f"></div><span class="leg-txt">older</span></div>
  <hr class="leg-divider">
  <h4>Size (acres)</h4>
  <div class="leg-size-row"><div class="leg-circle" style="width:7px;height:7px"></div><span class="leg-txt">~100</span></div>
  <div class="leg-size-row"><div class="leg-circle" style="width:14px;height:14px"></div><span class="leg-txt">~10k</span></div>
  <div class="leg-size-row"><div class="leg-circle" style="width:22px;height:22px"></div><span class="leg-txt">100k+</span></div>
</div>

<div id="map"></div>

<script>
  const map = L.map('map', { preferCanvas: true, zoomControl: true, worldCopyJump: true })
               .setView([20, 10], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CartoDB</a> | Data: <a href="https://eonet.gsfc.nasa.gov/" style="color:#f5945b">NASA EONET</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  // The map wraps horizontally (the world repeats), so draw each fire on the
  // neighbouring world copies too. 0 = canonical, ±360 = the copies either side.
  const WORLD_OFFSETS = [-360, 0, 360];

  function radius(acres) {
    if (acres == null || acres <= 0) return 3;
    return Math.max(3, Math.min(18, 3 + Math.log10(acres + 1) * 2.4));
  }

  function ageDays(dateStr) {
    return (Date.now() - new Date(dateStr).getTime()) / 86400000;
  }

  function recencyColor(days) {
    if (days <= 7)  return '#e74c3c';
    if (days <= 30) return '#f39c12';
    if (days <= 90) return '#f1c40f';
    return '#a9784f';
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
  }

  function fmtAcres(a) {
    return (a == null) ? 'not reported' : Math.round(a).toLocaleString() + ' acres';
  }

  function ttHtml(p) {
    const src = (p.sources && p.sources[0] && p.sources[0].url) ? p.sources[0].url : null;
    const days = Math.max(0, Math.round(ageDays(p.date)));
    return `<div class="tt">
      <div class="tt-place">${p.title || 'Wildfire'}</div>
      <div class="tt-grid">
        <span class="tt-key">Last detected</span><span class="tt-val hot">${days} day${days === 1 ? '' : 's'} ago</span>
        <span class="tt-key">Date</span><span class="tt-val">${fmtTime(p.date)}</span>
        <span class="tt-key">Size</span><span class="tt-val">${fmtAcres(p.magnitudeValue)}</span>
        ${p.description ? `<span class="tt-key">Where</span><span class="tt-val">${p.description}</span>` : ''}
      </div>
    </div>`;
  }

  let allFeatures = [];
  let layerGroup = L.layerGroup().addTo(map);
  let currentAcres = 0;
  let currentDays = 90;

  function renderMap() {
    layerGroup.clearLayers();
    const filtered = allFeatures.filter(f => {
      const p = f.properties;
      if (ageDays(p.date) > currentDays) return false;
      if (currentAcres > 0 && !(p.magnitudeValue >= currentAcres)) return false;
      return true;
    }).sort((a, b) => (a.properties.magnitudeValue || 0) - (b.properties.magnitudeValue || 0));

    filtered.forEach(f => {
      const [lon, lat] = f.geometry.coordinates;
      const p = f.properties;
      const col = recencyColor(ageDays(p.date));
      const r = radius(p.magnitudeValue);
      const html = ttHtml(p);
      const links = [];
      if (p.sources && p.sources[0] && p.sources[0].url) links.push(`<a href="${p.sources[0].url}" target="_blank" style="color:#e67e22">Source ↗</a>`);
      if (p.link) links.push(`<a href="${p.link}" target="_blank" style="color:#e67e22">EONET ↗</a>`);
      const popup = html + (links.length ? `<div style="padding:0 12px 9px;font-size:10px;color:#aaa">${links.join(' · ')}</div>` : '');

      WORLD_OFFSETS.forEach(off => {
        const c = L.circleMarker([lat, lon + off], {
          radius: r,
          fillColor: col,
          color: 'rgba(0,0,0,0.5)',
          weight: 0.5,
          fillOpacity: 0.8,
          opacity: 1
        });
        c.bindTooltip(html, { sticky: true, opacity: 1, className: '' });
        c.bindPopup(popup);
        layerGroup.addLayer(c);
      });
    });

    document.getElementById('vis').textContent = filtered.length.toLocaleString();
  }

  const DATA_URL = 'https://eonet.gsfc.nasa.gov/api/v3/events/geojson?category=wildfires&status=open';

  fetch(DATA_URL)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      allFeatures = (data.features || []).filter(f => f.geometry && f.geometry.type === 'Point' && f.properties && f.properties.date);
      document.getElementById('tot').textContent = allFeatures.length.toLocaleString();
      let newest = 0;
      allFeatures.forEach(f => { const t = new Date(f.properties.date).getTime(); if (t > newest) newest = t; });
      if (newest) document.getElementById('ts').textContent = 'Most recent: ' + fmtTime(newest);
      renderMap();
    })
    .catch(err => {
      document.getElementById('loading').querySelector('p').textContent = 'Failed to load data';
      document.getElementById('error-msg').textContent = err.message + ' — check internet connection';
    });

  const acreSlider = document.getElementById('acreSlider');
  acreSlider.addEventListener('input', () => {
    currentAcres = parseInt(acreSlider.value);
    document.getElementById('acreVal').textContent = currentAcres === 0 ? '0 ac' : '≥ ' + currentAcres.toLocaleString() + ' ac';
    renderMap();
  });

  const daysSlider = document.getElementById('daysSlider');
  daysSlider.addEventListener('input', () => {
    currentDays = parseInt(daysSlider.value);
    document.getElementById('daysVal').textContent = currentDays + (currentDays === 1 ? ' day' : ' days');
    renderMap();
  });
</script>
</body>
</html>
